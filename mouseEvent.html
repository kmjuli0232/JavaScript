<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Adding Event Listeners</title>
    <script src="mouseEvent.js" defer></script>
    <style>
      h1 {
        background-color: brown;
      }

      .container {
        color: green;
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .card {
        width: 100px;
        height: 120px;
        background-color: pink;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 4px;
        font-size: 36px;
      }

      .add-card {
        cursor: pointer;
        background-color: cadetblue;
        color: black;
        position: absolute;
        bottom: 33px;
        right: 32px;
        border-radius: 100%;
        height: 50px;
        width: 50px;
        line-height: 10px;
      }
    </style>
  </head>
  <body style="font-family: cursive">
    <h1 draggable="true">Adding Event Listeners</h1>
    <div class="container">
      <div class="card add-card" title="Add New Card"><span>+</span></div>
    </div>
  </body>
</html>
